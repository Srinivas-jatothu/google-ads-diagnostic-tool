<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Ads Diagnostic Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        h1 {
            color: #1a73e8;
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #5f6368;
            font-size: 16px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-left: 4px solid #1a73e8;
        }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .metric-card h3 {
            color: #5f6368;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-card .value {
            color: #1a73e8;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .metric-card .change {
            font-size: 13px;
            color: #34a853;
            font-weight: 500;
        }

        .metric-card .change.negative {
            color: #ea4335;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .chart-container h2 {
            color: #202124;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        .diagnostics-section {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .diagnostics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .diagnostics-header h2 {
            color: #202124;
            font-size: 22px;
            font-weight: 600;
        }

        .issue-summary {
            display: flex;
            gap: 15px;
        }

        .issue-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .issue-badge.critical {
            background: #fce8e6;
            color: #ea4335;
        }

        .issue-badge.high {
            background: #fef7e0;
            color: #f9ab00;
        }

        .issue-badge.medium {
            background: #e8f0fe;
            color: #1a73e8;
        }

        .issue-card {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid;
            transition: transform 0.2s ease;
        }

        .issue-card:hover {
            transform: translateX(5px);
        }

        .issue-card.critical {
            background: #fce8e6;
            border-color: #ea4335;
        }

        .issue-card.high {
            background: #fef7e0;
            border-color: #f9ab00;
        }

        .issue-card.medium {
            background: #e8f0fe;
            border-color: #1a73e8;
        }

        .issue-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .issue-title {
            font-size: 16px;
            font-weight: 600;
            color: #202124;
        }

        .campaign-name {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 8px;
        }

        .issue-metric {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 10px;
        }

        .issue-metric strong {
            color: #202124;
        }

        .recommendation {
            background: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #5f6368;
            line-height: 1.6;
        }

        .recommendation::before {
            content: "💡 ";
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: white;
            font-size: 20px;
        }

        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-issues {
            text-align: center;
            padding: 60px 20px;
            color: #34a853;
        }

        .no-issues-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .no-issues-text {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .no-issues-subtext {
            color: #5f6368;
            font-size: 16px;
        }

        .campaigns-table {
            width: 100%;
            margin-top: 20px;
        }

        .campaigns-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .campaigns-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #5f6368;
            border-bottom: 2px solid #e8eaed;
        }

        .campaigns-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #e8eaed;
            font-size: 14px;
            color: #202124;
        }

        .campaigns-table tr:hover {
            background: #f8f9fa;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-dot.good {
            background: #34a853;
        }

        .status-dot.warning {
            background: #f9ab00;
        }

        .status-dot.poor {
            background: #ea4335;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Google Ads Diagnostic Dashboard</h1>
            <p class="subtitle">Automated Performance Monitoring & Troubleshooting Tool</p>
        </header>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading campaign data...</p>
        </div>

        <div id="content" style="display: none;">
            <!-- Metrics Grid -->
            <div class="metrics-grid" id="metrics"></div>

            <!-- Performance Trends Chart -->
            <div class="chart-container">
                <h2>📈 Performance Trends (Last 30 Days)</h2>
                <div class="chart-wrapper">
                    <canvas id="trendsChart"></canvas>
                </div>
            </div>

            <!-- Top Campaigns Chart -->
            <div class="chart-container">
                <h2>💰 Top Campaigns by Spend</h2>
                <div class="chart-wrapper">
                    <canvas id="campaignsChart"></canvas>
                </div>
            </div>

            <!-- Campaigns Performance Table -->
            <div class="chart-container">
                <h2>📊 Campaign Performance Overview</h2>
                <div class="campaigns-table" id="campaignsTable"></div>
            </div>

            <!-- Diagnostics Section -->
            <div class="diagnostics-section">
                <div class="diagnostics-header">
                    <h2>🔍 Automated Diagnostics</h2>
                    <div class="issue-summary" id="issueSummary"></div>
                </div>
                <div id="issues"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';

        async function loadDashboard() {
            try {
                // Load all data in parallel
                const [metrics, trends, campaigns, diagnostics] = await Promise.all([
                    fetch(`${API_URL}/dashboard`).then(r => r.json()),
                    fetch(`${API_URL}/trends`).then(r => r.json()),
                    fetch(`${API_URL}/campaigns/performance`).then(r => r.json()),
                    fetch(`${API_URL}/diagnostics`).then(r => r.json())
                ]);

                displayMetrics(metrics);
                displayTrends(trends);
                displayCampaignsChart(campaigns);
                displayCampaignsTable(campaigns);
                displayDiagnostics(diagnostics);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('loading').innerHTML = `
                    <p style="color: #ea4335;">⚠️ Error loading data. Make sure the backend is running.</p>
                    <p style="font-size: 14px; margin-top: 10px;">Run: python backend/main.py</p>
                `;
            }
        }

        function displayMetrics(data) {
            const metricsHTML = `
                <div class="metric-card">
                    <h3>Total Impressions</h3>
                    <div class="value">${formatNumber(data.total_impressions)}</div>
                    <div class="change">Last 7 days</div>
                </div>
                <div class="metric-card">
                    <h3>Total Clicks</h3>
                    <div class="value">${formatNumber(data.total_clicks)}</div>
                    <div class="change">CTR: ${data.avg_ctr}%</div>
                </div>
                <div class="metric-card">
                    <h3>Conversions</h3>
                    <div class="value">${formatNumber(data.total_conversions)}</div>
                    <div class="change">CVR: ${data.avg_conversion_rate}%</div>
                </div>
                <div class="metric-card">
                    <h3>Total Spend</h3>
                    <div class="value">$${formatNumber(data.total_cost)}</div>
                    <div class="change">Across ${data.active_campaigns} campaigns</div>
                </div>
                <div class="metric-card">
                    <h3>Total Revenue</h3>
                    <div class="value">$${formatNumber(data.total_revenue)}</div>
                    <div class="change">ROAS: ${data.avg_roas}x</div>
                </div>
                <div class="metric-card">
                    <h3>Profit</h3>
                    <div class="value ${data.profit < 0 ? 'negative' : ''}">$${formatNumber(data.profit)}</div>
                    <div class="change ${data.roi_percentage < 0 ? 'negative' : ''}">
                        ROI: ${data.roi_percentage}%
                    </div>
                </div>
            `;
            document.getElementById('metrics').innerHTML = metricsHTML;
        }

        function displayTrends(data) {
            const ctx = document.getElementById('trendsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => formatDate(d.date)),
                    datasets: [
                        {
                            label: 'Clicks',
                            data: data.map(d => d.clicks),
                            borderColor: '#1a73e8',
                            backgroundColor: 'rgba(26, 115, 232, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Conversions',
                            data: data.map(d => d.conversions),
                            borderColor: '#34a853',
                            backgroundColor: 'rgba(52, 168, 83, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Cost ($)',
                            data: data.map(d => d.cost),
                            borderColor: '#ea4335',
                            backgroundColor: 'rgba(234, 67, 53, 0.1)',
                            tension: 0.4,
                            fill: true,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                        }
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            position: 'left',
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            grid: {
                                drawOnChartArea: false,
                            },
                        }
                    }
                }
            });
        }

        function displayCampaignsChart(data) {
            const ctx = document.getElementById('campaignsChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.campaign_name),
                    datasets: [{
                        label: 'Total Spend ($)',
                        data: data.map(d => d.total_cost),
                        backgroundColor: '#1a73e8',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        function displayCampaignsTable(data) {
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Campaign</th>
                            <th>Impressions</th>
                            <th>Clicks</th>
                            <th>CTR</th>
                            <th>Conversions</th>
                            <th>ROAS</th>
                            <th>Spend</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(c => `
                            <tr>
                                <td><strong>${c.campaign_name}</strong></td>
                                <td>${formatNumber(c.impressions)}</td>
                                <td>${formatNumber(c.clicks)}</td>
                                <td>${c.avg_ctr}%</td>
                                <td>${formatNumber(c.conversions)}</td>
                                <td>${c.avg_roas}x</td>
                                <td>$${formatNumber(c.total_cost)}</td>
                                <td>
                                    <span class="status-dot ${getStatusClass(c.avg_roas, c.avg_ctr)}"></span>
                                    ${getStatusText(c.avg_roas, c.avg_ctr)}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('campaignsTable').innerHTML = tableHTML;
        }

        function displayDiagnostics(data) {
            const summaryHTML = `
                ${data.critical > 0 ? `<span class="issue-badge critical">${data.critical} Critical</span>` : ''}
                ${data.high > 0 ? `<span class="issue-badge high">${data.high} High</span>` : ''}
                ${data.medium > 0 ? `<span class="issue-badge medium">${data.medium} Medium</span>` : ''}
            `;
            document.getElementById('issueSummary').innerHTML = summaryHTML;

            if (data.issues.length === 0) {
                document.getElementById('issues').innerHTML = `
                    <div class="no-issues">
                        <div class="no-issues-icon">✅</div>
                        <div class="no-issues-text">All Systems Healthy!</div>
                        <div class="no-issues-subtext">No critical issues detected in your campaigns</div>
                    </div>
                `;
                return;
            }

            const issuesHTML = data.issues.map(issue => `
                <div class="issue-card ${issue.severity.toLowerCase()}">
                    <div class="issue-header">
                        <div>
                            <div class="issue-title">${issue.issue_type}</div>
                            <div class="campaign-name">${issue.campaign_name}</div>
                        </div>
                        <span class="issue-badge ${issue.severity.toLowerCase()}">${issue.severity}</span>
                    </div>
                    <div class="issue-metric">
                        <strong>${issue.metric_name}:</strong> ${issue.metric_value} (Threshold: ${issue.threshold})
                    </div>
                    <div class="issue-metric">
                        <strong>Impact:</strong> ${issue.impact}
                    </div>
                    <div class="recommendation">${issue.recommendation}</div>
                </div>
            `).join('');

            document.getElementById('issues').innerHTML = issuesHTML;
        }

        function getStatusClass(roas, ctr) {
            if (roas >= 3.0 && ctr >= 2.0) return 'good';
            if (roas >= 2.0 && ctr >= 1.5) return 'warning';
            return 'poor';
        }

        function getStatusText(roas, ctr) {
            if (roas >= 3.0 && ctr >= 2.0) return 'Healthy';
            if (roas >= 2.0 && ctr >= 1.5) return 'Needs Attention';
            return 'Critical';
        }

        function formatNumber(num) {
            return new Intl.NumberFormat().format(Math.round(num));
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // Load dashboard on page load
        loadDashboard();

        // Refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
